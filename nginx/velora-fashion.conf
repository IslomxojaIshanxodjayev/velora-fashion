# Nginx configuration for Velora Fashion
# Place this file at /etc/nginx/conf.d/velora-fashion.conf on EC2
# Then run: sudo nginx -s reload

upstream velora_docker {
    server localhost:8080;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name velora-fashion.duckdns.org;
    
    # Allow certbot to verify domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name velora-fashion.duckdns.org;

    # SSL certificate paths (generated by certbot)
    ssl_certificate /etc/letsencrypt/live/velora-fashion.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/velora-fashion.duckdns.org/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logging
    access_log /var/log/nginx/velora-fashion-access.log;
    error_log /var/log/nginx/velora-fashion-error.log;

    # Proxy to Docker container
    location / {
        proxy_pass http://velora_docker;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
