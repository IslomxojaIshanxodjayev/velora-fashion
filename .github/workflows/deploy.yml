name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: eu-north-1
  EC2_INSTANCE_IP: 56.228.15.15
  DOCKER_IMAGE_NAME: velora-fashion
  DOCKER_REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:latest
          ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to EC2
      env:
        EC2_USER: ec2-user
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        DOCKER_IMAGE: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}:latest
      run: |
        # Create temporary SSH key file
        mkdir -p ~/.ssh
        echo "$EC2_SSH_KEY" > ~/.ssh/ec2_key.pem
        chmod 600 ~/.ssh/ec2_key.pem
        
        # Add EC2 instance to known_hosts
        ssh-keyscan -H ${{ env.EC2_INSTANCE_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Deploy: Stop old container, pull new image, and run it
        ssh -i ~/.ssh/ec2_key.pem ${{ env.EC2_USER }}@${{ env.EC2_INSTANCE_IP }} << 'EOF'
          set -e
          
          echo "Logging in to GitHub Container Registry..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login -u ${{ github.actor }} --password-stdin ${{ env.DOCKER_REGISTRY }}
          
          echo "Stopping old container..."
          docker stop velora-fashion || true
          docker rm velora-fashion || true
          
          echo "Pulling new Docker image..."
          docker pull ${{ env.DOCKER_IMAGE }}
          
          echo "Starting new container..."
          docker run -d \
            --name velora-fashion \
            --restart unless-stopped \
            -p 8080:8080 \
            ${{ env.DOCKER_IMAGE }}
          
          echo "Deployment completed successfully!"
          docker ps --filter "name=velora-fashion"
        EOF
        
        # Clean up SSH key
        rm ~/.ssh/ec2_key.pem
